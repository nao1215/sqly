name: E2E

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellspec:
    name: shellspec (binary e2e)

    strategy:
      matrix:
        os:
          - "ubuntu-latest"
          - "macos-latest"
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"

      - name: Install shellspec
        run: |
          curl -fsSL https://git.io/shellspec | sh -s 0.28.1 --yes
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run shellspec end-to-end tests
        # The hermetic runner builds sqly and runs the suite in a temp-backed
        # HOME/config sandbox, so local and CI execution are identical.
        run: make test-e2e
