name: Smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Binary-level smoke coverage that builds the real sqly binary and drives it
# through stdin and flags. The harness is pure Go, so the same checks run on
# Windows, macOS, and Linux, complementing the atago end-to-end suite with
# Windows binary-level coverage.
#
# This job also carries the PTY-backed interactive-shell tests (e2e/pty_e2e_test.go,
# tagged `smoke && !windows`): they run here on the Unix runners and are excluded
# on Windows by the build tag, where the batch smoke tests still apply.
jobs:
  smoke:
    name: binary smoke
    strategy:
      matrix:
        os:
          - "ubuntu-latest"
          - "macos-latest"
          - "windows-latest"
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"

      - name: Run binary smoke tests
        run: go test -tags smoke ./e2e/...
