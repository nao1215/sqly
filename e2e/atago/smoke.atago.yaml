# Dogfood spec: exercises atago against the real `sqly` CLI (github.com/nao1215/sqly).
# The hermetic runner (scripts/run_e2e.sh) builds sqly and puts it on PATH.
# Run with: make test-e2e
# sqly derives the table name from the file name, so users.csv -> table "users".
version: "1"

suite:
  name: sqly

scenarios:
  - name: count rows in a CSV fixture
    steps:
      - fixture:
          file: users.csv
          content: |
            id,name
            1,Alice
            2,Bob
      - run:
          command: sqly --sql 'SELECT count(*) AS cnt FROM users' --csv users.csv
      - assert:
          exit_code: 0
          stdout:
            contains: "2"

  - name: filter rows and select a column
    steps:
      - fixture:
          file: users.csv
          content: |
            id,name
            1,Alice
            2,Bob
      - run:
          command: sqly --sql 'SELECT name FROM users WHERE id = 1' --csv users.csv
      - assert:
          exit_code: 0
          stdout:
            contains: Alice

  - name: markdown output format works
    steps:
      - fixture:
          file: users.csv
          content: |
            id,name
            1,Alice
      - run:
          command: sqly --sql 'SELECT name FROM users' --markdown users.csv
      - assert:
          exit_code: 0
      # Markdown tables have a header separator row; assert on that and the value.
      - assert:
          stdout:
            matches: "\\|-+\\|"
      - assert:
          stdout:
            contains: Alice
