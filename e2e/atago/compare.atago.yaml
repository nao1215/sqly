# Migrated from sqly's ShellSpec spec/compare_spec.sh (issue #276).
# --compare diffs two imported tables (schema, row count, keyed rows); JSON is
# the default, --compare-format text is human-readable. Run with: make test-e2e
version: "1"

suite:
  name: sqly --compare workflow

scenarios:
  - name: reports schema, row count, and keyed rows as JSON
    steps:
      - fixture: &rev1
          file: rev1.csv
          content: |
            id,name,age
            1,Alice,30
            2,Bob,25
            3,Carol,40
      - fixture: &rev2
          file: rev2.csv
          content: |
            id,name,age
            1,Alice,31
            2,Bob,25
            4,Dave,50
      - run:
          command: sqly --compare --compare-key id rev1.csv rev2.csv
      - assert:
          exit_code: 0
          stdout:
            json:
              path: "$.schema.equal"
              equals: true
      - assert:
          stdout:
            json:
              path: "$.row_count.delta"
              equals: 0
      - assert:
          stdout:
            json:
              path: "$.rows.key"
              equals: id
      - assert:
          stdout:
            contains:
              - '"4"'
              - '"3"'

  - name: emits a human-readable summary with --compare-format text
    steps:
      - fixture: *rev1
      - fixture: *rev2
      - run:
          command: sqly --compare --compare-key id --compare-format text rev1.csv rev2.csv
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "schema: identical"
              - "1 added, 1 removed, 1 modified"

  - name: resolves an uppercase --compare-key against a lowercase column
    steps:
      - fixture: *rev1
      - fixture: *rev2
      - run:
          command: sqly --compare --compare-key ID rev1.csv rev2.csv
      - assert:
          exit_code: 0
          stdout:
            json:
              path: "$.rows.key"
              equals: ID

  - name: rejects a missing key column
    steps:
      - fixture: *rev1
      - fixture: *rev2
      - run:
          command: sqly --compare --compare-key nope rev1.csv rev2.csv
      - assert:
          exit_code: 1
          stderr:
            contains: "compare key"

  - name: rejects a duplicate key value as ambiguous
    steps:
      - fixture:
          file: dupe.csv
          content: |
            id,name
            1,Alice
            1,Bob
      - fixture:
          file: single.csv
          content: |
            id,name
            1,Alice
      - run:
          command: sqly --compare --compare-key id dupe.csv single.csv
      - assert:
          exit_code: 1
          stderr:
            contains: "not unique"

  - name: rejects a genuinely missing --compare-tables name
    steps:
      - fixture: *rev1
      - fixture: *rev2
      - run:
          command: sqly --compare --compare-tables "nope,rev2" rev1.csv rev2.csv
      - assert:
          exit_code: 1
          stderr:
            contains: "compare table"

  - name: rejects an ambiguous single-table compare
    steps:
      - fixture: *rev1
      - run:
          command: sqly --compare rev1.csv
      - assert:
          exit_code: 1
          stderr:
            contains: "exactly two tables"

  - name: follows CLI input order for left and right, not table-name sorting
    steps:
      - fixture: &zebra
          file: zebra.csv
          content: |
            id,name
            1,Alice
      - fixture: &ant
          file: ant.csv
          content: |
            id,name
            1,Alice
      - run:
          command: sqly --compare --compare-format text zebra.csv ant.csv
      - assert:
          exit_code: 0
          stdout:
            line: 1
            equals: "compare zebra -> ant"

  - name: reverses left and right when the inputs are swapped
    steps:
      - fixture: *zebra
      - fixture: *ant
      - run:
          command: sqly --compare --compare-format text ant.csv zebra.csv
      - assert:
          exit_code: 0
          stdout:
            line: 1
            equals: "compare ant -> zebra"

