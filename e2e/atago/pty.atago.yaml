# PTY tests for sqly's interactive shell (its readline REPL). A `run:` step feeds
# stdin as a non-TTY batch script and never exercises the prompt; a `pty:` step
# runs sqly inside a real pseudo-terminal and drives it with an expect/send
# session, so the interactive path — prompt rendering, per-command execution,
# dot-commands, live .mode switching, error recovery, and clean exit — is
# verified end to end against the real binary.
#
# These run on Unix (POSIX pty). They are skipped on Windows (ConPTY): the prompt
# is re-rendered a beat before its read loop is ready, and on a ConPTY the input
# delivered in that window is dropped rather than buffered, so a command is typed
# but never executed and the session hangs. That is a terminal-backend race in the
# prompt library, tracked upstream at github.com/nao1215/prompt/issues/13; it
# cannot be fixed reliably from the test side (combining the command and its CR
# into one send, serializing, and retrying all reduce but do not remove it). The
# skip is removed once prompt#13 is fixed. Windows binary behavior stays covered by
# the batch smoke tests. Two authoring rules keep the Unix sessions robust,
# including when the whole suite runs in parallel and the sessions starve each
# other of CPU:
#
#   * Submit a command with a trailing CR in the same send (`"...\r"`), not a
#     separate `{key: enter}` step. The prompt is re-rendered a beat before its
#     read loop is ready, so an Enter delivered as its own write right after the
#     command can be dropped, leaving the command typed but never executed. Sending
#     the command and its CR as one write keeps them in the same read, so the CR is
#     not lost. A bare "\n" is not the Return key a raw-mode line editor waits for;
#     the CR (0x0d) is.
#   * Quit with EOF (`send: ""`, a single ^D) after the prompt returns, not by
#     typing ".exit" — a one-byte terminal EOF cannot race the completer or the
#     prompt's read-readiness the way a multi-character command submitted with
#     Enter can. After a query, wait for a token that appears only in the
#     executed result before expecting the prompt again, or the prompt echoed
#     mid-typing would match too early.
version: "1"

suite:
  name: sqly interactive shell (pty)

scenarios:
  - name: an interactive query prints its result table
    skip: { os: windows } # ConPTY read-readiness race (prompt#13); see file header
    steps:
      - fixture: &people
          file: people.csv
          content: |
            name,age,city
            Alice,30,Tokyo
            Bob,25,Osaka
            Carol,41,Kyoto
      - pty:
          command: sqly people.csv
          rows: 24
          cols: 80
          timeout: 30s
          session:
            - expect: '\(table\)\$' # the prompt ends with "(<mode>)$ "; table is default
            - send: "SELECT name FROM people WHERE age = 25;\r"
            - expect: "Bob" # Bob is the only 25-year-old; a result token, not echoed text
            - expect: '\(table\)\$' # the prompt returned, editor idle again
            - send: "" # EOF (^D) quits cleanly
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "Bob"
              - "+--" # the box-drawn result table sqly renders to the terminal

  - name: the prompt reflects a live .mode switch
    skip: { os: windows } # ConPTY read-readiness race (prompt#13); see file header
    steps:
      - fixture: *people
      - pty:
          command: sqly people.csv
          timeout: 30s
          session:
            - expect: '\(table\)\$'
            - send: ".mode csv\r"
            - expect: '\(csv\)\$' # the mode change is live: the next prompt says csv
            - send: ""
      - assert:
          exit_code: 0

  - name: .tables lists the imported table
    skip: { os: windows } # ConPTY read-readiness race (prompt#13); see file header
    steps:
      - fixture: *people
      - pty:
          command: sqly people.csv
          timeout: 30s
          session:
            - expect: '\(table\)\$'
            - send: ".tables\r"
            - expect: "people" # the imported CSV became the "people" table
            - expect: '\(table\)\$'
            - send: ""
      - assert:
          exit_code: 0
          stdout:
            contains: "people"

  - name: .schema shows the imported columns
    skip: { os: windows } # ConPTY read-readiness race (prompt#13); see file header
    steps:
      - fixture: *people
      - pty:
          command: sqly people.csv
          timeout: 30s
          session:
            - expect: '\(table\)\$'
            - send: ".schema people\r" # .schema requires a table name
            - expect: "city" # a column from the CREATE TABLE DDL, post-execution
            - expect: '\(table\)\$'
            - send: ""
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "CREATE TABLE"
              - "city"

  - name: a computed aggregate round-trips through the shell
    skip: { os: windows } # ConPTY read-readiness race (prompt#13); see file header
    steps:
      - fixture: *people
      - pty:
          command: sqly people.csv
          timeout: 30s
          session:
            - expect: '\(table\)\$'
            # A distinctive, self-labeling result so the wait cannot match stray
            # output — the count of the three imported rows.
            - send: "SELECT 'ROWS=' || COUNT(*) AS r FROM people;\r"
            - expect: "ROWS=3"
            - expect: '\(table\)\$'
            - send: ""
      - assert:
          exit_code: 0
          stdout:
            contains: "ROWS=3"

  - name: two queries run in one interactive session
    skip: { os: windows } # ConPTY read-readiness race (prompt#13); see file header
    steps:
      - fixture: *people
      - pty:
          command: sqly people.csv
          timeout: 30s
          session:
            - expect: '\(table\)\$'
            - send: "SELECT name FROM people WHERE city = 'Tokyo';\r"
            - expect: "Alice"
            - expect: '\(table\)\$'
            - send: "SELECT name FROM people WHERE city = 'Kyoto';\r"
            - expect: "Carol"
            - expect: '\(table\)\$'
            - send: ""
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "Alice"
              - "Carol"

  - name: an invalid query reports an error and the shell recovers to the prompt
    skip: { os: windows } # ConPTY read-readiness race (prompt#13); see file header
    steps:
      - fixture: *people
      - pty:
          command: sqly people.csv
          timeout: 30s
          session:
            - expect: '\(table\)\$'
            - send: "SELECT * FROM no_such_table;\r"
            - expect: "no such table" # the query error is reported, not swallowed
            - expect: '\(table\)\$' # the shell recovered to a working prompt (it did
              # not exit on the error) — the clean EOF exit below confirms it is
              # still reading input.
            - send: ""
      - assert:
          exit_code: 0
          stdout:
            contains: "no such table"

  - name: EOF at the prompt exits the shell cleanly
    skip: { os: windows } # ConPTY read-readiness race (prompt#13); see file header
    steps:
      - fixture: *people
      - pty:
          command: sqly people.csv
          timeout: 30s
          session:
            - expect: '\(table\)\$'
            - send: "" # EOF (^D) at an empty prompt exits with status 0
      - assert:
          exit_code: 0
