# Non-CSV formats through the compression read/write path. JSON, JSONL, and
# NDJSON under gzip are already covered (v0_20/v0_22 bug suites, export_inference),
# and compression_roundtrip.atago.yaml covers CSV across every codec. This pins
# the remaining gaps: TSV and LTSV under gzip, and a non-CSV format under a
# non-gzip codec. Each scenario writes the format compressed, then re-imports and
# reads rows back, so a passing round-trip exercises both the writer and the
# format parser behind the decompression reader. Run with: make test-e2e
version: "1"

suite:
  name: sqly non-CSV formats under compression

scenarios:
  - name: tsv round-trips through gzip
    steps:
      - fixture: &tsv
          file: s.tsv
          content: "id\tv\n1\ta\n2\tb\n"
      - run:
          command: sqly --tsv --sql "SELECT * FROM s ORDER BY id" s.tsv --output o.tsv.gz
      - assert:
          exit_code: 0
          stderr:
            contains: "output mode=tsv"
      - run:
          command: sqly --csv --sql "SELECT id, v FROM o ORDER BY id" o.tsv.gz
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "1,a"
              - "2,b"

  - name: ltsv round-trips through gzip
    steps:
      - fixture:
          file: s.ltsv
          content: "id:1\tv:a\nid:2\tv:b\n"
      - run:
          command: sqly --ltsv --sql "SELECT * FROM s ORDER BY id" s.ltsv --output o.ltsv.gz
      - assert:
          exit_code: 0
          stderr:
            contains: "output mode=ltsv"
      - run:
          command: sqly --csv --sql "SELECT id, v FROM o ORDER BY id" o.ltsv.gz
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "1,a"
              - "2,b"

  - name: tsv round-trips through zstd
    steps:
      - fixture: *tsv
      - run:
          command: sqly --tsv --sql "SELECT * FROM s ORDER BY id" s.tsv --output o.tsv.zst
      - assert:
          exit_code: 0
      - run:
          command: sqly --csv --sql "SELECT id, v FROM o ORDER BY id" o.tsv.zst
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "1,a"
              - "2,b"
