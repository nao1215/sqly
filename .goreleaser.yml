version: 2
project_name: sqly
env:
  - GO111MODULE=on
before:
  hooks:
    - go mod tidy
    #- go generate ./...
builds:
  - main: .
    ldflags:
      - -s -w -X 'github.com/nao1215/sqly/config.Version=v{{ .Version }}'
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-next"
# Curated release notes: a short human summary first, then changes grouped by
# user-facing category instead of a raw commit dump.
release:
  header: |
    ## sqly {{ .Tag }}

    Easily execute SQL against CSV/TSV/LTSV/JSON and Microsoft Excel™ with a shell.

    Install or upgrade, then see the grouped highlights below. Every artifact is
    signed and ships with an SBOM and build provenance — see
    [Verifying release integrity](https://github.com/nao1215/sqly#verifying-release-integrity).
  footer: |
    **Full changelog**: https://github.com/nao1215/sqly/compare/{{ .PreviousTag }}...{{ .Tag }}
changelog:
  sort: asc
  use: github
  groups:
    - title: "Breaking changes"
      regexp: '^.*?[a-zA-Z]+(\(.+\))??!:.+$'
      order: 0
    - title: "Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 1
    - title: "Bug fixes"
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 2
    - title: "Performance"
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 3
    - title: "Documentation"
      regexp: '^.*?docs(\(.+\))??!?:.+$'
      order: 4
    - title: "Others"
      order: 999
  filters:
    exclude:
      - "^tests?(\\(.+\\))?!?:"
      - "^chore(\\(.+\\))?!?:"
      - "^style(\\(.+\\))?!?:"
      - "^ci(\\(.+\\))?!?:"
      - "Merge pull request"
      - "Merge branch"
# Software Bill of Materials for every release archive.
sboms:
  - artifacts: archive
# Keyless artifact signing with cosign. Signing the checksums file transitively
# covers every published artifact.
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true
nfpms:
  - maintainer: Naohiro CHIKAMATSU <n.chika156@gmail.com>
    description: sqly - easily execute SQL against CSV/TSV/LTSV/JSON and Microsoft Excel™ with shell.
    homepage: https://github.com/nao1215/sqly
    license: MIT License
    formats:
      - deb
      - rpm
      - apk
brews:
  - name: sqly
    description: sqly - easily execute SQL against CSV/TSV/LTSV/JSON and Microsoft Excel™ with shell.
    license: MIT
    repository:
      owner: nao1215
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
